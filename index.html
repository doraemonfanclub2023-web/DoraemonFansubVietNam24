<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doraemon Fansub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#0d0e12] text-white">

    <!-- Header -->
    <header class="sticky top-0 z-50 flex items-center justify-between px-4 py-3 bg-[#16181f] border-b border-gray-800">
        <h1 class="text-lg font-bold text-blue-500">doraemon<span class="text-white">fansub</span></h1>
        <nav class="flex gap-3 text-sm text-gray-400">
            <a href="index.html" class="text-white">Trang chủ</a>
            <a href="watch.html">Xem phim</a>
        </nav>
        <button id="btn-open-auth-modal" class="bg-blue-600 px-3 py-1 rounded-lg text-xs">Đăng nhập</button>
    </header>

    <!-- Main -->
    <main class="max-w-xl mx-auto p-4">
        <div class="bg-[#16181f] p-4 rounded-xl mb-4 border border-gray-800">
            <textarea id="post-content" placeholder="Bồ đang nghĩ gì thế?" class="w-full bg-[#20232b] text-white p-3 rounded-lg mb-2 text-sm"></textarea>
            <div class="flex justify-between items-center">
                <input type="file" id="post-file" class="text-[10px] text-gray-400">
                <button id="btn-submit-post" class="bg-blue-600 px-3 py-1 rounded-lg text-xs font-bold">Đăng bài</button>
            </div>
        </div>
        <div id="newsfeed-container" class="space-y-4"></div>
    </main>

    <!-- Modal Auth -->
    <div id="auth-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center hidden z-[100] p-4">
        <div class="bg-[#16181f] p-5 rounded-xl w-full max-w-xs border border-gray-700">
            <h2 class="text-white text-lg font-bold mb-3">Đăng Nhập</h2>
            <input type="email" id="auth-email" placeholder="Email" class="w-full mb-2 bg-[#20232b] p-2 rounded text-sm border border-gray-600">
            <input type="password" id="auth-password" placeholder="Mật khẩu" class="w-full mb-2 bg-[#20232b] p-2 rounded text-sm border border-gray-600">
            <button id="btn-forgot-password" class="text-[10px] text-blue-400 mb-3 w-full text-center">Quên mật khẩu?</button>
            <button id="btnAuthSubmit" class="w-full bg-blue-600 p-2 rounded text-sm font-bold">Đăng Nhập</button>
            <button id="btn-toggle-auth" class="text-[10px] text-gray-400 mt-2 w-full text-center">Chưa có tài khoản? Đăng ký ngay</button>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/newsfeed.js"></script>
</body>
</html>
